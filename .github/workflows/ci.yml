name: CI

on:
  push:
    branches: [master, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Tests (default features)
        run: cargo test --workspace
      - name: Tests (all features)
        run: cargo test --workspace --all-features

  measure-bpp:
    name: Measure BPP (quick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run measure_bpp quick
        env:
          TSINK_FAIL_ON_TARGET: "1"
        run: bash scripts/measure_bpp.sh quick

  bench:
    name: Benchmarks (quick regression check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Restore criterion baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: criterion-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            criterion-${{ runner.os }}-
      - name: Run benchmarks (quick)
        run: bash scripts/measure_perf.sh quick
      - name: Check for regressions (>50%)
        run: bash scripts/check_bench_regression.sh 50

  server-single-node-bench:
    name: tsink-server single-node regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Restore server benchmark baseline
        uses: actions/cache@v4
        with:
          path: target/server-bench
          key: server-bench-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            server-bench-${{ runner.os }}-
      - name: Run tsink-server single-node benchmark (quick)
        run: bash scripts/measure_server_single_node.sh quick
      - name: Check tsink-server regression thresholds
        run: bash scripts/check_server_single_node_regression.sh
